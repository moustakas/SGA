# Micromamba/conda environment for the Siena Galaxy Atlas (SGA) 2025 — NERSC.
#
# astrometry.net, tractor, legacypipe, pydl, and SGA are pip-installed
# separately by create-env.sh because mamba runs pip installs before the
# environment is fully activated, which breaks builds that need a working
# compiler + numpy headers. pydl is pip-only (not on conda-forge).

name: SGA
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.13
  - c-compiler          # needed to build astrometry.net and tractor
  - swig                # needed to build astrometry.net and tractor
  - pkgconf             # pkg-config, used during astrometry.net build
  # C libraries required by astrometry.net source build
  - cairo
  - cfitsio
  - gsl
  - libjpeg-turbo
  - libpng
  - netpbm
  - wcslib
  # SGA core dependencies (mirrors pyproject.toml)
  - numpy
  - astropy
  - fitsio
  - matplotlib
  - scipy
  - photutils
  - healpy
  # Jupyter kernel support
  - ipykernel
  - ipython
  - pip
