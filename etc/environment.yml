# Micromamba/conda environment for the Siena Galaxy Atlas (SGA) 2025 — NERSC.
#
# Create with:
#   micromamba create --prefix /global/common/software/desi/users/ioannis/SGA \
#                     --file etc/environment.yml
#
# astrometry.net is intentionally excluded: it is provided at runtime by
# Dustin's tractor/perlmutter-2 module (see activate.sh), which adds the
# pre-built C extensions and shared libraries to PYTHONPATH/LD_LIBRARY_PATH.
#
# tractor and legacypipe are pip-installed from GitHub. tractor has Cython
# extensions that only need numpy headers + a C compiler at build time (no
# astrometry.net required until runtime), so the build order is safe.

name: SGA
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.13
  - c-compiler          # needed to build tractor's Cython extensions
  # SGA core dependencies (mirrors pyproject.toml)
  - numpy
  - astropy
  - fitsio
  - matplotlib
  - scipy
  - photutils
  - pydl
  # Jupyter kernel support
  - ipykernel
  - ipython
  - pip
  - pip:
    - git+https://github.com/dstndstn/tractor
    - git+https://github.com/legacysurvey/legacypipe
    - git+https://github.com/moustakas/SGA
