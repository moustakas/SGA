# Micromamba/conda environment for the Siena Galaxy Atlas (SGA) 2025 — laptop.
#
# astrometry.net and tractor are pip-installed separately from source
# (see create-env-laptop.sh) because:
#   - astrometry.net is not reliably available on conda-forge
#   - tractor's setup.py imports numpy at configure time, which breaks
#     inside mamba's pip subprocess before the env is activated
#   - pydl is pip-only (not on conda-forge)
#
# C library deps for building astrometry.net from source are included here
# so they are available when create-env-laptop.sh runs the pip install.

name: SGA
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.13
  - c-compiler          # needed to build tractor and astrometry.net
  - swig                # needed to build tractor and astrometry.net
  # C libraries required by astrometry.net source build
  - cfitsio
  - libjpeg-turbo
  - libpng
  - zlib
  # SGA core dependencies (mirrors pyproject.toml)
  - numpy
  - astropy
  - fitsio
  - matplotlib
  - scipy
  - photutils
  # Jupyter kernel support
  - ipykernel
  - ipython
  - pip
