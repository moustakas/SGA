# Micromamba/conda environment for the Siena Galaxy Atlas (SGA) 2025 — laptop.
#
# astrometry.net is built from source by create-env-laptop.sh using a full
# make build (not pip-installable). The C library deps below are required by
# that build. tractor, legacypipe, pydl, and SGA are also pip-installed by
# the script rather than listed here, for the same reason as on NERSC.

name: SGA
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.13
  - c-compiler          # gcc/clang for astrometry.net and tractor
  - swig                # required by astrometry.net and tractor
  - pkgconf             # pkg-config, used during astrometry.net build
  # C libraries required by astrometry.net source build
  - cairo
  - cfitsio
  - gsl
  - libjpeg-turbo
  - libpng
  - netpbm
  - wcslib
  # SGA core dependencies (mirrors pyproject.toml)
  - numpy
  - astropy
  - fitsio
  - matplotlib
  - scipy
  - photutils
  - healpy
  # Jupyter kernel support
  - ipykernel
  - ipython
  - pip
